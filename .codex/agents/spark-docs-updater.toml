name = "spark_docs_updater"
description = "Updates gate evidence, checklists, fixture catalogs, and non-authoritative docs from manager instructions."
model = "gpt-5.3-codex-spark"
model_reasoning_effort = "low"
sandbox_mode = "workspace-write"

developer_instructions = """
Update documentation only.

Do not change src/, tests/, fixtures/, specs/, or ADRs unless explicitly allowed.
Preserve explicit non-claims.
Do not convert planning evidence into implementation readiness.
Run git diff --check.
"""
