name: gate-01

permissions:
  contents: read

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore NexusScholar.Core.slnx

      - name: Build
        run: dotnet build NexusScholar.Core.slnx -c Release --no-restore

      - name: Package smoke
        shell: pwsh
        run: ./scripts/verify-packages.ps1

      - name: Test
        run: dotnet test NexusScholar.Core.slnx -c Release --no-build --filter "TestCategory!=LiveProvider" --logger trx --results-directory artifacts/test-results

      - name: Mutation phase 5
        shell: pwsh
        run: ./scripts/mutation-phase5.ps1

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.os }}
          path: artifacts/test-results/*.trx
          if-no-files-found: error

      - name: Collect informational coverage
        if: matrix.os == 'ubuntu-latest'
        run: dotnet test NexusScholar.Core.slnx -c Release --no-build --filter "TestCategory!=LiveProvider" --collect:"XPlat Code Coverage" --results-directory artifacts/coverage

      - name: Upload informational coverage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-cobertura
          path: artifacts/coverage/**/coverage.cobertura.xml
          if-no-files-found: error

      - name: CLI smoke
        run: |
          dotnet run --project src/NexusScholar.Cli --configuration Release --no-build -- doctor
          dotnet run --project src/NexusScholar.Cli --configuration Release --no-build -- sample
          dotnet run --project src/NexusScholar.Cli --configuration Release --no-build -- demo

      - name: Format
        run: dotnet format NexusScholar.Core.slnx --verify-no-changes --no-restore

      - name: Build Windows desktop portable artifact
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: ./scripts/publish-desktop-portable.ps1 -RequireCleanSourceTree

      - name: Verify extracted Windows desktop artifact
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: ./scripts/verify-desktop-portable.ps1 -RequireCleanSourceTree

      - name: Upload verified Windows desktop artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v7
        with:
          name: desktop-portable-${{ github.sha }}
          path: artifacts/desktop-release/
          if-no-files-found: error
