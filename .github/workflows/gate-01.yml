name: gate-01

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore NexusScholar.Core.slnx

      - name: Build
        run: dotnet build NexusScholar.Core.slnx -c Release --no-restore

      - name: Test
        run: dotnet test NexusScholar.Core.slnx -c Release --no-build

      - name: Collect informational coverage
        if: matrix.os == 'ubuntu-latest'
        run: dotnet test NexusScholar.Core.slnx -c Release --no-build --collect:"XPlat Code Coverage" --results-directory artifacts/coverage

      - name: Upload informational coverage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-cobertura
          path: artifacts/coverage/**/coverage.cobertura.xml
          if-no-files-found: error

      - name: CLI smoke
        run: |
          dotnet run --project src/NexusScholar.Cli --configuration Release --no-build -- doctor
          dotnet run --project src/NexusScholar.Cli --configuration Release --no-build -- sample
          dotnet run --project src/NexusScholar.Cli --configuration Release --no-build -- demo

      - name: Format
        run: dotnet format NexusScholar.Core.slnx --verify-no-changes --no-restore
