name: Research workflow use case
description: Describe a real research workflow problem Nexus should eventually support.
title: "[Use case] "
labels: ["workflow-use-case", "feedback"]
body:
  - type: markdown
    attributes:
      value: |
        Use this to describe a workflow need. This does not mean the feature is implemented or promised.
  - type: textarea
    id: workflow
    attributes:
      label: Workflow context
      description: What kind of review or research workflow are you describing?
      placeholder: "Systematic review, rapid review, scoping review, thesis literature screening..."
    validations:
      required: true
  - type: textarea
    id: pain
    attributes:
      label: Current pain point
      description: What currently goes wrong with tools, spreadsheets, search exports, deduplication, screening, evidence, or audit trails?
    validations:
      required: true
  - type: textarea
    id: evidence-needed
    attributes:
      label: Evidence and audit needs
      description: What would need to be reconstructable later?
    validations:
      required: true
  - type: textarea
    id: expected-output
    attributes:
      label: Expected output or decision point
      description: What would a useful local demo or future feature show?
    validations:
      required: false
  - type: checkboxes
    id: boundaries
    attributes:
      label: Boundaries
      options:
        - label: I understand current Nexus Scholar Core is local-first and not a production researcher app.
          required: true
        - label: This use case can be discussed without requiring live provider calls, provider credentials, scraping, cloud sync, PDF/OCR, or PHP compatibility claims today.
          required: true
